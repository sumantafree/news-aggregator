# Render config — Web Service only (free plan, no card required)
# Cron job is handled by cron-job.org (free external service) — see DEPLOYMENT.md

services:
  - type: web
    name: news-aggregator-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: ""
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SITE_URL
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: RSS_REFRESH_INTERVAL
        value: "600"
      - key: CACHE_TTL_SECONDS
        value: "600"
